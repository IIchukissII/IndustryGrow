name: DCO

on:
  pull_request:

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on all PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          mapfile -t commits < <(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA")
          if [ "${#commits[@]}" -eq 0 ]; then
            echo "No non-merge commits to check."
            exit 0
          fi
          for sha in "${commits[@]}"; do
            subject=$(git show -s --format='%s' "$sha")
            author_email=$(git show -s --format='%ae' "$sha")
            signoff_emails=$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha" \
              | sed -n 's/.*<\(.*\)>.*/\1/p')
            if [ -z "$signoff_emails" ]; then
              echo "::error::Commit ${sha:0:8} ('$subject') has no Signed-off-by line."
              fail=1; continue
            fi
            if ! printf '%s\n' "$signoff_emails" | grep -qixF "$author_email"; then
              echo "::error::Commit ${sha:0:8} ('$subject'): no Signed-off-by matching author <$author_email>. Found: $(printf '%s ' $signoff_emails)"
              fail=1; continue
            fi
            echo "OK ${sha:0:8} '$subject' — signed-off-by <$author_email>"
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "DCO check failed. Sign off every commit with 'git commit -s' (see CONTRIBUTING.md)."
            exit 1
          fi
          echo "All commits carry a Signed-off-by matching their author."
