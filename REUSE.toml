version = 1

# Hardware design files in store/ — KiCad sources (.kicad_sch/.pcb/.pro/.prl/.mod)
# and generated fabrication outputs (gerbers, drill, BOM, placement, render) —
# cannot carry an inline SPDX comment (strict parsers / binary / generated), so
# they are annotated here per the REUSE specification.
#
# precedence = "closest": a store file that DOES carry its own inline SPDX header
# uses that header; only header-less files fall back to this CERN-OHL-S default.
# This lets documentation-layer documents that also live flat in the store under
# the ADR-0017 identifier scheme (e.g. the CC-BY-SA Manual SP0004-M-gateway-bringup.md,
# ADR-0017 d9/d15) carry their own licence, while every hardware design file —
# which cannot hold an inline header — stays CERN-OHL-S.
[[annotations]]
path = "store/**"
precedence = "closest"
SPDX-FileCopyrightText = "2026 The IndustryGrow contributors"
SPDX-License-Identifier = "CERN-OHL-S-2.0"

# Firmware release artifacts (ADR-0017 'F' layer; see REGISTRY.md) are reference
# firmware under AGPL-3.0-or-later (ADR-0002 d5), NOT the CERN-OHL-S hardware
# default above. The .hex/.zip are binary and carry no inline header, so the
# F-layer paths are annotated here and override the store/** default. (Added at
# build time by firmware/tools/release.sh; this rule waits for them.)
[[annotations]]
path = ["store/E0001-*-F.hex", "store/E0001-*-F-src.zip"]
precedence = "override"
SPDX-FileCopyrightText = "2026 The IndustryGrow contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Project images/logos, ADR figures, the roadmap figure, and this manifest itself
# (no inline-comment option for the binary PNGs; SVGs kept uniform with them).
[[annotations]]
path = ["img/**", "ADR/figures/**", "project/figures/*.svg", "project/figures/*.png", "REUSE.toml", ".gitignore"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 The IndustryGrow contributors"
SPDX-License-Identifier = "CC-BY-SA-4.0"

# Repo submodule manifest — a list of firmware dependency URLs. The submodule
# contents are gitlinks (not files in this tree) and so are not REUSE-scanned;
# only this manifest needs a licence. Kept inline-header-free as a clean git
# config file and annotated here, like .gitignore above.
[[annotations]]
path = ".gitmodules"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 The IndustryGrow contributors"
SPDX-License-Identifier = "CC-BY-SA-4.0"

# Cultivation profiles (JSON instances) — strict JSON has no comment syntax for an
# inline SPDX header, so they are annotated here. Profiles are open by default
# (CC-BY-SA 4.0) per ADR-0003.
[[annotations]]
path = "profiles/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 The IndustryGrow contributors"
SPDX-License-Identifier = "CC-BY-SA-4.0"

# Instance & integration ERP application (ADR-0021) — AGPL-3.0-or-later per
# ADR-0021 decision 14. Source files carry their own inline SPDX header;
# precedence = "closest" lets those win, and header-less files (HTML templates,
# static CSS/JS, JSON seed fixtures) fall back to this AGPL default.
[[annotations]]
path = "erp/**"
precedence = "closest"
SPDX-FileCopyrightText = "2026 The IndustryGrow contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"
