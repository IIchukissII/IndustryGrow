#
# Sample mTLS termination for gateway callers (ADR-0022 decision 2).
#
# The gateway holds an ATECC608-bound client certificate issued under the
# operator's own root CA (ADR-0007 decision 3 — trust is rooted per operator;
# there is no global IndustryGrow root). This proxy verifies that certificate and
# hands the ERP two facts about it: whether verification succeeded, and the
# certificate's subject DN. The ERP derives GBOX_NNNN from the DN itself
# (erp/app/services/mtls.py) — nothing here sends a ready-made identity.
#
# See README.md in this directory for the trust model, the header contract, and
# how to generate a throwaway CA to exercise it.

events {}

http {
    default_type text/plain;

    # Keep the app's own view of the peer honest: it must see this proxy's
    # address, so do not add X-Forwarded-For here and do not run the app with
    # uvicorn's --proxy-headers (the container CMD passes --no-proxy-headers).
    upstream erp {
        server erp:8021;
    }

    # ---- the operator console and human/token API: server TLS only ----------
    # Operators authenticate with a scoped token (ADR-0022 d3), not a client
    # certificate, so client verification is off on this listener.
    server {
        listen 443 ssl;
        server_name erp.local;

        # The CHAIN, not the bare leaf: with the two-tier CA (ADR-0024 d1) a
        # client anchored on the root cannot build a path unless the server
        # sends its intermediate too.
        ssl_certificate     /etc/nginx/tls/server-chain.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # The gateway channel is not reachable here — it exists only on the
        # mTLS listener below, where an identity can actually be established.
        location /api/v1/gateway/ {
            return 403 "gateway routes require mTLS on port 8443\n";
        }

        location / {
            proxy_pass http://erp;
            proxy_set_header Host $host;
            # Strip any client-supplied copies of the mTLS contract headers.
            # This listener never authenticates a certificate, so it must never
            # look as though it did.
            proxy_set_header X-Client-Verify "";
            proxy_set_header X-Client-DN "";
        }
    }

    # ---- the gateway channel: mutual TLS -----------------------------------
    server {
        listen 8443 ssl;
        server_name erp.local;

        # The CHAIN, not the bare leaf: with the two-tier CA (ADR-0024 d1) a
        # client anchored on the root cannot build a path unless the server
        # sends its intermediate too.
        ssl_certificate     /etc/nginx/tls/server-chain.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # The operator root (ADR-0007 d3). Chain validation happens here and
        # only here; the ERP never sees a certificate.
        # depth 2 is required, not incidental: the chain is root -> issuing CA
        # -> leaf (ADR-0024 d1), and the anchor here is the root alone (d3), so
        # the peer's intermediate has to be walked. Depth 1 would refuse every
        # correctly-issued gateway.
        ssl_client_certificate /etc/nginx/tls/operator-root.crt;
        ssl_verify_client      on;
        ssl_verify_depth       2;

        # Revocation is "cease renewal + deny-list", not CRL/OCSP (ADR-0007 d7),
        # so no ssl_crl here. Gateway certificates are short-lived; an expired
        # one fails verification below and never reaches the app.

        location / {
            proxy_pass http://erp;
            proxy_set_header Host $host;

            # The contract. $ssl_client_verify is SUCCESS, FAILED:<reason>, or
            # NONE; $ssl_client_s_dn is the subject DN of the verified peer.
            # Assigning both unconditionally also overwrites anything the client
            # sent under these names — a forged pair cannot survive this hop.
            proxy_set_header X-Client-Verify $ssl_client_verify;
            proxy_set_header X-Client-DN     $ssl_client_s_dn;
        }
    }
}
