#
# journald — ADR-0004 rev 1 decision 11: persistent, size-limited system logs
# as operator-debugging infrastructure (NOT a forensic/audit trail — that lives
# platform-side per ADR-0004 d10). Installed to
# /etc/systemd/journald.conf.d/99-industrygrow.conf

[Journal]
Storage=persistent
SystemMaxUse=100M
