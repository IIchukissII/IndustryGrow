#
# sshd hardening drop-in — ADR-0004 rev 1 decision 2.
# Installed to /etc/ssh/sshd_config.d/00-industrygrow-hardening.conf
#
# WHY THE `00-` PREFIX: sshd uses the FIRST obtained value for each keyword, and
# drop-ins are read in lexical order. Raspberry Pi OS / the Imager ship a
# `50-cloud-init.conf` containing `PasswordAuthentication yes`; a `99-` file would
# be read AFTER it and lose. `00-` is read FIRST, so our `PasswordAuthentication
# no` wins. (This is the opposite of the usual "higher number overrides" — that
# rule is for last-wins systems; sshd_config is first-wins.)
#
# BRING-UP POSTURE (this file): sshd stays ENABLED — you are provisioning over it.
# Only the dangerous auth modes are removed: key-only, root login off, no
# passwords. The automation NEVER disables sshd; doing so would lock you out
# mid-bring-up.
#
# PRODUCTION POSTURE (ADR-0004 rev 1 decision 2, NOT applied here): sshd is
# DISABLED by default and re-enabled per-operation. The Manual documents that
# toggle; it is a deliberate operator action, not part of this automation.

PasswordAuthentication no
PermitRootLogin no
PubkeyAuthentication yes
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PermitEmptyPasswords no
UsePAM yes
