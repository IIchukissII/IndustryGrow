<text class="mono" x="1380.6666666666667" y="592" font-size="11.5" fill="#16201B">Local profile file is doable at #6 (ADR-0015 d4); a signed /</text>
<text class="mono" x="1380.6666666666667" y="610" font-size="11.5" fill="#16201B">versioned / rollback profile needs PKI + IndustryFlow → #11.</text>
<text class="mono" x="1380.6666666666667" y="628" font-size="11.5" fill="#16201B">First cultivation #10 can run on a plain local file.</text>
<text class="mono" x="40" y="712" font-size="11.5" fill="#5B6B63">* ADR-0005 (DSDL) and ADR-0009 (profile schema) are referenced but not yet audited — must exist before #2 and #9.  —  #14 gate also pulls from #10 (one full cycle) and #11 (mTLS, survives net loss + reboot).</text>
