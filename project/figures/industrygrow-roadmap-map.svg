<text class="mono" x="719.3333333333334" y="592" font-size="11.5" fill="#16201B">Survey #7 needs a durable sink, but cloud lands only at</text>
<text class="mono" x="719.3333333333334" y="610" font-size="11.5" fill="#16201B">#11 — so for #1–10 the gateway IS the primary store.</text>
<text class="mono" x="719.3333333333334" y="628" font-size="11.5" fill="#16201B">ADR-0020: an SSD/NVMe medium retires the endurance bar; a</text>
<text class="mono" x="719.3333333333334" y="646" font-size="11.5" fill="#16201B">time-boxed survey-capture path + bounded store-and-forward</text>
<text class="mono" x="719.3333333333334" y="664" font-size="11.5" fill="#16201B">buffer. Local audit log stays rejected (threat model).</text>
